name: Label PR when Trivy shows removed critical CVE

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-critical-fix:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    steps:
      - name: Check Trivy diff comment and manage label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const body = context.payload.comment.body || "";
            const author = context.payload.comment.user?.login || "";
            const labelName = "CVE critical fixed";

            // Only act on the trusted Trivy bot comment format
            const isTrivyComment =
              (author === "github-actions" || author === "github-actions[bot]") &&
              body.includes("Changes Trivy Scan") &&
              body.includes("diff -U") &&
              body.includes("scan_summary.md");

            if (!isTrivyComment) {
              core.info("Not a matching Trivy scan comment.");
              return;
            }

            const lines = body.split(/\r?\n/);

            // Collect removed HTML table rows from the diff, for example:
            // -    <tr>
            // -        <td>npm</td>
            // -        <td>CVE-2026-4800</td>
            // -        <td>CRITICAL</td>
            // -    </tr>
            const removedRows = [];
            let currentRow = null;

            for (const raw of lines) {
              const line = raw.trim();

              // Only removed diff lines; skip file headers like --- a/file
              if (!line.startsWith("-") || line.startsWith("---")) {
                continue;
              }

              const content = line.replace(/^-+\s?/, "");

              if (content.includes("<tr>")) {
                currentRow = [content];
                continue;
              }

              if (currentRow) {
                currentRow.push(content);

                if (content.includes("</tr>")) {
                  removedRows.push(currentRow.join("\n"));
                  currentRow = null;
                }
              }
            }

            const criticalRows = removedRows.filter(row => {
              const tdCount = (row.match(/<td>/g) || []).length;
              return tdCount >= 4 &&
                /\bCVE-\d{4}-\d+\b/i.test(row) &&
                /\bCRITICAL\b/i.test(row);
            });

            const labelsResp = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number,
            });
            const hasLabel = labelsResp.data.some(l => l.name === labelName);

            if (criticalRows.length > 0) {
              // Ensure label exists
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: labelName,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: "0e8a16",
                    description: "PR removes at least one critical CVE in Trivy diff",
                  });
                } else {
                  throw e;
                }
              }

              if (!hasLabel) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [labelName],
                });
                core.info(`Added label "${labelName}" to PR #${issue_number}`);
              } else {
                core.info(`Label "${labelName}" already present on PR #${issue_number}`);
              }

              core.info(`Matched removed critical rows:\n${criticalRows.join("\n---\n")}`);
            } else {
              if (hasLabel) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: labelName,
                });
                core.info(`Removed label "${labelName}" from PR #${issue_number}`);
              } else {
                core.info("No removed CRITICAL CVE row found.");
              }
            }

{{- range .Values.applications }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .name }}-kubrix-service-status 
  {{- if .destinationNamespaceOverwrite }}
  namespace: {{ .destinationNamespaceOverwrite }}
  {{- else }}
  namespace: {{ .name }}
  {{- end }}
  labels:
    platform: kubrix
    service: {{ .name }}
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: {{ .name }}
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="{{ .name }}"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="{{ .name }}"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="{{ .name }}"})) == bool 0))
        )
{{- end }}

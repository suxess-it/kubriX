apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Namespace }}-kubrix-service-status 
  labels:
    platform: kubrix
    service: {{ .Release.Namespace }}
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: {{ .Release.Namespace }}
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="{{ .Release.Namespace }}"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="{{ .Release.Namespace }}"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="{{ .Release.Namespace }}"})) == bool 0))
        )

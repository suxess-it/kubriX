apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: trivy-dashboard
  annotations:
    grafana_folder: {{ required "grafanaFolder must be set" .Values.grafanaFolder | quote }}
data:
  trivy-dashboard.json: |-
{{ .Files.Get "dashboard-files/trivy-dashboard.json" | indent 4 }}

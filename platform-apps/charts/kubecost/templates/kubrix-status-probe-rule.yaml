{{- if .Values.kubrixStatusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubecost-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: kubecost
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: kubecost
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="kubecost"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="kubecost"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="kubecost"})) == bool 0))
        )
{{- end }}
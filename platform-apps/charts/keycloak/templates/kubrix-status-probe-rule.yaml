{{- if .Values.kubrixStatusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: keycloak-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        service: kargo
        platform: kubrix
      static:
        - http://kubrix-keycloak-service.keycloak.svc:9000/health/ready
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: keycloak-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: keycloak
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: keycloak
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="keycloak"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="keycloak"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="keycloak"})) == bool 0))
        )
{{- end }}
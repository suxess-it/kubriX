apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: {{ Release.Namespace }}-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        platform: kubrix
        service: {{ Release.Namespace }}
      static:
        - http://sx-cert-manager.cert-manager.svc:9402/

{{- if .Values.kubrixStatusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: {{ Release.Namespace }}-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        platform: kubrix
        service: {{ Release.Namespace }}
      static:
        - http://sx-cert-manager.cert-manager.svc:9402/metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ Release.Namespace }}-kubrix-service-status 
  labels:
    platform: kubrix
    service: {{ Release.Namespace }}
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: {{ Release.Namespace }}
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="{{ Release.Namespace }}"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="{{ Release.Namespace }}"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="{{ Release.Namespace }}"})) == bool 0))
        )
{{- end }}

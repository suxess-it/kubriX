apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: backstage-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        service: backstage
        platform: kubrix
      static:
        - https://{{ .Values.backstage.ingress.host }}/.backstage/health/v1/liveness
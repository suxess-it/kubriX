apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: komoplane-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        service: komoplane
        platform: kubrix
      static:
        - https://{{ .Values.komoplane.ingress.hosts[0].host }}/login
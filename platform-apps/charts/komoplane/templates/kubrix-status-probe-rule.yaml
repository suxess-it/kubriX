{{- if .Values.kubrixStatusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: komoplane-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        service: komoplane
        platform: kubrix
      static:
        - https://{{ .Values.komoplane.ingress.hosts[0].host }}/login
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: komoplane-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: komoplane
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: komoplane
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="komoplane"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="komoplane"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="komoplane"})) == bool 0))
        )
{{- end }}
external-dns:
  fullnameOverride: external-dns
  extraArgs:
  - --provider-cache-time=15m
  ## enable DNS record creation for Traefik IngressRoute/IngressRouteTCP resources (requires hostname annotation on the resource)
  - --source=traefik-proxy
  
  rbac:
    additionalPermissions:
    - apiGroups:
      - traefik.io
      resources:
      - ingressroutes
      - ingressroutetcps
      - ingressrouteudps
      verbs:
      - get
      - list
      - watch
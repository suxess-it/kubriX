apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-dns-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: external-dns
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: external-dns
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="external-dns"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="external-dns"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="external-dns"})) == bool 0))
        )
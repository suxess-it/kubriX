apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: grafana-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        platform: kubrix
        service: grafana
      static:
        - https://{{ index .Values.grafana.ingress.hosts 0 }}/api/health
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: grafana-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: grafana
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: grafana
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="grafana"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="grafana"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="grafana"})) == bool 0))
        )

apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: kargo-probe
spec:
  interval: 60s
  module: https_2xx_insecure
  prober:
    url: sx-prometheus-blackbox-exporter.prometheus-blackbox-exporter.svc:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        service: kargo
        platform: kubrix
      static:
        - https://{{ .Values.kargo.api.host }}/login
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kargo-kubrix-service-status
  namespace: mimir
  labels:
    platform: kubrix
    service: kargo
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: kargo
      expr: |
        (
          2 * (scalar(min(probe_success{platform="kubrix",service="kargo"})) == bool 0)
        )
        +
        (
          scalar(max(GRAFANA_ALERTS{namespace="kargo"} == bool 1) or vector(0))
          *
          (1 - (scalar(min(probe_success{platform="kubrix",service="kargo"})) == bool 0))
        )
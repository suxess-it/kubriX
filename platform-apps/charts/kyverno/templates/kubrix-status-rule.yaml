{{- if .Values.kubrixStatusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Namespace }}-kubrix-service-status
  namespace: {{ .Values.kubrixStatusRule.namespace | default "k8s-monitoring" }}
  labels:
    platform: kubrix
    service: {{ .Release.Namespace }}
spec:
  groups:
  - name: kubrix.service.status
    interval: 30s
    rules:
    - record: kubrix_service_status
      labels:
        platform: kubrix
        service: {{ .Release.Namespace }}
      expr: |
        (
          2 * scalar(
            max(GRAFANA_ALERTS{namespace="{{ .Release.Namespace }}", severity="critical"} == bool 1)
            or vector(0)
          )
        )
        +
        (
          scalar(
            max(GRAFANA_ALERTS{namespace="{{ .Release.Namespace }}", severity="warning"} == bool 1)
            or vector(0)
          )
          *
          (
            1 - scalar(
              max(GRAFANA_ALERTS{namespace="{{ .Release.Namespace }}", severity="critical"} == bool 1)
              or vector(0)
            )
          )
        )
{{- end }}